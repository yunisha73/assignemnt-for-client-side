<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Hidden Nepal</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background: #1e3d59;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .hero {
      height: 80vh;
      background: url('https://images.unsplash.com/photo-1544731612-de7f96afe55f') no-repeat center/cover;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .hero h2 {
      font-size: 3em;
      text-shadow: 2px 2px 5px black;
    }

    .hero button {
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      background: orange;
      cursor: pointer;
    }

    .hero button:hover {
      background: darkorange;
    }

    .section {
      padding: 40px;
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
    }

    .card {
      width: 250px;
      margin: 15px;
      padding: 20px;
      border-radius: 10px;
      background: #f4f4f4;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    footer {
      background: #1e3d59;
      color: white;
      text-align: center;
      padding: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>Explore Hidden Nepal</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="destinations.html">Destinations</a>
    <a href="activities.html">Activities</a>
    <a href="guide.html">Travel Guide</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- HERO SECTION -->
<section class="hero">
  <h2>Discover Nepal Beyond the Crowds</h2>
  <button onclick="goToDestinations()">Explore Destinations</button>
</section>

<!-- FEATURED DESTINATIONS -->
<section class="section">
  <h2>Hidden Destinations</h2>

  <div class="cards">
    <div class="card" onclick="showInfo('khopra')">
      <h3>Khopra Danda</h3>
      <p>Peaceful Himalayan ridge trek.</p>
    </div>

    <div class="card" onclick="showInfo('mohare')">
      <h3>Mohare Danda</h3>
      <p>Eco-friendly community trek.</p>
    </div>

    <div class="card" onclick="showInfo('tsum')">
      <h3>Tsum Valley</h3>
      <p>Remote spiritual valley.</p>
    </div>
  </div>

  <p id="info" style="margin-top:20px; font-weight:bold;"></p>
</section>

<footer>
  <p>© 2026 Explore Hidden Nepal</p>
</footer>

<script>
function goToDestinations() {
  window.location.href = "destinations.html";
}

function showInfo(place) {
  let text = "";

  if (place === "khopra") {
    text = "Khopra Danda offers stunning views of Dhaulagiri with fewer tourists.";
  } 
  else if (place === "mohare") {
    text = "Mohare Danda supports local communities and eco-tourism.";
  } 
  else if (place === "tsum") {
    text = "Tsum Valley is rich in Tibetan culture and untouched beauty.";
  }

  document.getElementById("info").innerHTML = text;
}
</script>

</body>
</html>
